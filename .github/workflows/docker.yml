name: docker-release

on:
  push:
    branches:
      - main
      - prod

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      image: ${{ steps.vars.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/dsefros/pr-reviewer-test-assistant" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: dsefros
          password: ${{ secrets.CR_PAT }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dsefros/pr-reviewer-test-assistant
          tags: |
            type=raw,value=dev-latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=dev-${{ steps.vars.outputs.short_sha }},enable=${{ github.ref_name == 'main' }}
            type=raw,value=prod-latest,enable=${{ github.ref_name == 'prod' }}
            type=raw,value=prod-${{ steps.vars.outputs.short_sha }},enable=${{ github.ref_name == 'prod' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-prod:
    if: github.ref_name == 'prod'
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to prod server over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          SHORT_SHA="${GITHUB_SHA::7}"
          ssh "$SSH_USER@$SSH_HOST" "cd ~/PR-Reviewer-Test-Assistant && bash scripts/prod/deploy_prod.sh prod-${SHORT_SHA}"
