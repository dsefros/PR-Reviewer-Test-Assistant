default_model: ollama-local-llama3

profiles:
  mock-default:
    backend: mock
    model_name: mock-v1
    temperature: 0.1
    max_tokens: 1200

  ollama-local-llama3:
    backend: ollama
    model_name: llama3:8b-instruct-q5_K_M
    base_url: http://127.0.0.1:11434
    temperature: 0.1
    max_tokens: 1500

  llama-cpp-default:
    backend: llama_cpp
    model_name: local-gguf
    model_path: /models/model.gguf
    n_ctx: 4096
    temperature: 0.1
    max_tokens: 1500
