default_model: mock-default
profiles:
  mock-default:
    backend: mock
    model_name: mock-v1
    temperature: 0.1
    max_tokens: 1200
  ollama-default:
    backend: ollama
    model_name: llama3.1
    base_url: http://ollama:11434
    temperature: 0.1
    max_tokens: 1500
  llama-cpp-default:
    backend: llama_cpp
    model_name: local-gguf
    model_path: /models/model.gguf
    n_ctx: 4096
    temperature: 0.1
    max_tokens: 1500
